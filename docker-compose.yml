services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - .:/var/www/html
            - /var/www/html/vendor
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        env_file: .env

    nginx:
        image: nginx:alpine
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    mysql:
        image: mysql:8
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
        command: >
            sh -c "mkdir -p /var/log/supervisor &&
                   supervisord -c /etc/supervisor/conf.d/supervisord.conf"
        volumes:
            - .:/var/www/html
            - /var/www/html/vendor
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
            - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        env_file: .env
        restart: unless-stopped

    horizon:
        build:
            context: .
            dockerfile: Dockerfile
        command: php artisan horizon
        volumes:
            - .:/var/www/html
            - /var/www/html/vendor
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        env_file: .env
        restart: unless-stopped

volumes:
    mysql_data:
    redis_data:
